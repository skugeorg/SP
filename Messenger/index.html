<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZOV-messenger</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/images.png">
</head>
<body>
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2>Вход в ZOV-messenger</h2>
            <p>Введите ваше имя</p>
            <input type="text" id="authUsername" placeholder="Ваше имя" maxlength="20" autocomplete="off">
            <div id="authError" class="error-message"></div>
            <button id="authButton">Войти</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="chat-header">
            ZOV-messenger
            <div class="user-info">Онлайн: <span id="userCount">0</span></div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-area">
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <button id="attachButton" title="Прикрепить фото">📎</button>
            <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="on">
            <button id="sendButton">Отправить</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
